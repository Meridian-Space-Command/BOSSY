services:
  - class: org.yamcs.archive.XtceTmRecorder
  - class: org.yamcs.archive.ParameterRecorder
  - class: org.yamcs.archive.AlarmRecorder
  - class: org.yamcs.archive.ReplayServer
  - class: org.yamcs.parameter.SystemParametersService
    args:
      producers:
        - fs
        - jvm
  - class: org.yamcs.ProcessorCreatorService
    args:
      name: realtime
      type: realtime
      spec: |
        services:
          - class: org.yamcs.tctm.ProcessTmPacket
          - class: org.yamcs.algorithms.AlgorithmManager
          - class: org.yamcs.parameter.LocalParameterManager
          - class: org.yamcs.parameter.ParameterRequestManager
        config:
          subscribeAll: true
  - class: org.yamcs.archive.CommandHistoryRecorder
  - class: org.yamcs.parameterarchive.ParameterArchive
    args:
      realtimeFiller:
        enabled: true
      backFiller:
        enabled: false
        warmupTime: 60
  - class: org.yamcs.plists.ParameterListService
  - class: org.yamcs.timeline.TimelineService

timeService:
  class: org.yamcs.time.SimulationTimeService
  args:
    timeEncoding:
      useLocalGenerationTime: false
      useSimulationTime: true
  time: "2025-01-01T00:00:00Z"

dataLinks:
  - name: tm_in
    class: org.yamcs.tctm.UdpTmDataLink
    stream: tm_realtime
    port: 10015
    packetPreprocessorClassName: com.example.bossy.MyPacketPreprocessor
    updateSimulationTime: true

  - name: tc_out
    class: org.yamcs.tctm.UdpTcDataLink
    stream: tc_realtime
    host: localhost
    port: 10025
    commandPostprocessorClassName: com.example.bossy.MyCommandPostprocessor

mdb:
  - type: xtce
    args:
      file: mdb/xtce.xml

streamConfig:
  tm:
    - name: "tm_realtime"
      processor: "realtime"
    - name: "tm_dump"
  cmdHist: ["cmdhist_realtime", "cmdhist_dump"]
  event: ["events_realtime", "events_dump"]
  param: ["pp_realtime", "pp_dump", "sys_param", "proc_param"]
  parameterAlarm: ["alarms_realtime"]
  eventAlarm: ["event_alarms_realtime"]
  tc:
    - name: "tc_realtime"
      processor: "realtime"