realtime:
  services:
    - class: org.yamcs.StreamTmPacketProvider
    - class: org.yamcs.StreamTcCommandReleaser
    - class: org.yamcs.tctm.StreamParameterProvider
      args:
        streams: ["pp_realtime", "sys_param"]
    - class: org.yamcs.algorithms.AlgorithmManager
    - class: org.yamcs.parameter.LocalParameterManager
  config:
    subscribeAll: true
    # Record all parameters
    recordInitialValues: true
    recordLocalValues: true
    # Enable parameter and event alarms
    alarm:
      parameterCheck: true
      parameterServer: enabled
      eventServer: enabled
    # Configure CCSDS processing
    tmProcessor:
      # Our simulator uses strict CCSDS packet boundaries
      ignoreOutOfContainerEntries: false

# Used to perform step-by-step archive replays
Archive:
  services:
    - class: org.yamcs.tctm.ReplayService
    - class: org.yamcs.algorithms.AlgorithmManager
    - class: org.yamcs.parameter.LocalParameterManager
  config:
    # Keep a small cache for display updates
    parameterCache:
      enabled: true
      cacheAll: true
      maxNumEntries: 8

# Used by the ParameterArchive when rebuilding
ParameterArchive:
  services:
    - class: org.yamcs.tctm.ReplayService
    - class: org.yamcs.algorithms.AlgorithmManager
  config:
    parameterCache:
      enabled: false

# Used for archive retrievals
ArchiveRetrieval:
  services:
    - class: org.yamcs.tctm.ReplayService
    - class: org.yamcs.algorithms.AlgorithmManager
  config:
    parameterCache:
      enabled: false
    subscribeContainerArchivePartitions: false